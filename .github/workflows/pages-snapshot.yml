name: pages-snapshot

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'sh50-volguard' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate public snapshot
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/export_snapshot.py --refresh --output public/data/latest.json

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: sh50-pages-public
          path: public

      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          npm install -g wrangler
          wrangler pages deploy public --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch main
